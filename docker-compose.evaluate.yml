# Extends the base stack with a Locust load-testing service.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.evaluate.yml up -d
#   # Then open http://localhost:8089 for the Locust web UI
services:
  locust:
    image: locustio/locust:latest
    ports:
      - "8089:8089"
    volumes:
      - ./src/evaluate/load:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host http://api:8000
    depends_on:
      api:
        condition: service_healthy
    environment:
      ENDURE_TENANT_NAME: locust-tenant
